<!DOCTYPE html>

<html>
<head>
    <title>Add Student</title>

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    body{
        background:#0d1117;
        color:#f0f6fc;
        min-height:100vh;
    }

    .navbar{
        height:70px;
        background:#161b22;
        border-bottom:1px solid #30363d;

        display:flex;
        justify-content:space-between;
        align-items:center;

        padding:0 40px;
    }

    .navbar h2{
        font-size:22px;
        font-weight:600;
    }

    .navbar a{
        color:#f0f6fc;
        text-decoration:none;
    }

    .navbar a:hover{
        color:#58a6ff;
    }

    .container{
        display:flex;
        justify-content:center;
        align-items:center;

        padding:60px 20px;
    }

    .form-box{
        width:450px;

        background:#161b22;

        border:1px solid #30363d;

        border-radius:18px;

        padding:35px;
    }

    .form-box h1{
        text-align:center;
        margin-bottom:30px;
    }

    label{
        display:block;
        margin-bottom:8px;
        font-weight:500;
    }

    input{
        width:100%;

        padding:12px;

        margin-bottom:20px;

        border:1px solid #30363d;

        border-radius:10px;

        background:#0d1117;

        color:#f0f6fc;

        font-size:15px;
    }

    input:focus{
        outline:none;
        border-color:#58a6ff;
    }

    button{
        width:100%;

        padding:12px;

        border:none;

        border-radius:10px;

        background:#58a6ff;

        color:white;

        font-size:16px;

        font-weight:600;

        cursor:pointer;

        transition:0.25s;
    }

    button:hover{
        transform:translateY(-3px);
        opacity:0.9;
    }

    .success-message{
        background:#1f6f43;
        color:white;
        padding:12px;
        border-radius:10px;
        text-align:center;
        margin-bottom:20px;
    }

    .back-btn{
        display:block;

        margin-top:20px;

        text-align:center;

        text-decoration:none;

        color:#58a6ff;
    }

    .back-btn:hover{
        opacity:0.8;
    }

</style>

</head>

<body>

<div class="navbar">
    <h2>Student Manager</h2>
    <a href="/dashboard">Dashboard</a>
</div>

<div class="container">

    <div class="form-box">

        <h1>Add Student</h1>

        {% if success %}
        <p class="success-message">
            {{ success }}
        </p>
        {% endif %}

        <form method="POST">

            <label>Name</label>
            <input type="text" name="name" required>

            <label>Roll Number</label>
            <input type="text" name="roll_no" required>

            <label>CGPA</label>
            <input type="number" step="0.01" name="cgpa" required>

            <button type="submit">
                Add Student
            </button>

        </form>

        <a href="/dashboard" class="back-btn">
            ← Back to Dashboard
        </a>

    </div>

</div>

</body>
</html>
